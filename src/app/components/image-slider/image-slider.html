<div class="relative w-full h-[600px] overflow-hidden bg-primary-black">
  <!-- Stacked background layers crossfade by opacity (no flash-to-black) -->
  @for (slide of slides; track $index) {
    <div
      class="absolute inset-0 w-full h-full bg-cover bg-center scale-105 transition-opacity duration-700 ease-in-out"
      [class.opacity-100]="$index === currentIndex()"
      [class.opacity-0]="$index !== currentIndex()"
      [style.background-image]="'url(' + slide.image + ')'"
      [attr.aria-hidden]="$index !== currentIndex()"
    ></div>
  }

  <!-- Overlay with subtle dark-to-transparent gradient -->
  <div class="absolute inset-0 bg-gradient-to-t from-primary-black/80 via-primary-black/40 to-transparent z-10"></div>

  <!-- Content Layer -->
  <div class="absolute inset-0 flex items-center justify-center px-6 z-20">
    <div class="text-center text-white-text max-w-4xl space-y-6">
      <h1 class="text-4xl sm:text-6xl md:text-7xl font-display font-black tracking-tight leading-none drop-shadow-xl select-none">
        {{ currentSlide().title }}
      </h1>
      <p class="text-lg sm:text-xl md:text-2xl font-body max-w-2xl mx-auto text-gray-200 drop-shadow-md select-none">
        {{ currentSlide().description }}
      </p>
      
      @if (currentSlide().link) {
        <div class="pt-4">
          <a
            [routerLink]="currentSlide().link"
            class="bg-yellow-accent text-primary-black font-extrabold py-4 px-10 rounded-full shadow-lg hover:shadow-yellow-accent/20 hover:scale-105 active:scale-95 transition-all duration-300 inline-block text-base tracking-wide"
          >
            {{ currentSlide().buttonText }}
          </a>
        </div>
      }
    </div>
  </div>

  <!-- Slide Indicators / Dots -->
  <div class="absolute bottom-8 left-0 right-0 flex justify-center space-x-3 z-30">
    @for (slide of slides; track $index) {
      <button
        (click)="goToSlide($index)"
        [class]="'w-3 h-3 rounded-full cursor-pointer transition-all duration-300 ' + ($index === currentIndex() ? 'bg-yellow-accent scale-125 w-8' : 'bg-white/40 hover:bg-white/80')"
        [attr.aria-label]="'Ir a diapositiva ' + ($index + 1)"
      ></button>
    }
  </div>

  <!-- Left/Right Navigation Buttons -->
  <button
    (click)="prevSlide()"
    class="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-black/30 hover:bg-yellow-accent hover:text-primary-black text-white rounded-full flex items-center justify-center transition-all duration-300 backdrop-blur-sm hover:scale-110 active:scale-90 border border-white/10 z-30"
    aria-label="Diapositiva anterior"
  >
    <i class="fas fa-chevron-left text-lg"></i>
  </button>
  <button
    (click)="nextSlide()"
    class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-black/30 hover:bg-yellow-accent hover:text-primary-black text-white rounded-full flex items-center justify-center transition-all duration-300 backdrop-blur-sm hover:scale-110 active:scale-90 border border-white/10 z-30"
    aria-label="Siguiente diapositiva"
  >
    <i class="fas fa-chevron-right text-lg"></i>
  </button>
</div>
